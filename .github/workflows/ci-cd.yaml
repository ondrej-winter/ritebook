name: CI/CD

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check src/ritebook

      - name: Test
        run: uv run pytest -m "not e2e"

      - name: Build distribution packages
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/

  docker-e2e:
    name: Docker E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker E2E image
        run: docker build -f Dockerfile.e2e -t ritebook-e2e .

      - name: Run Docker E2E tests
        run: docker run --rm ritebook-e2e

  patch-release:
    name: Create patch release and publish to PyPI
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: [quality, docker-e2e]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ritebook/
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Configure release author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create patch release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version --patch --no-changelog

      - name: Publish distribution packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
